<header class="site-header">
  <div class="header-inner">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">Posts</a>
      <a href="{{ '/categories' | relative_url }}">Categories</a>
      <a href="{{ '/tutorials' | relative_url }}">Tutorials</a>
      <a href="{{ '/reading' | relative_url }}">Reading List</a>
      <a href="{{ '/about' | relative_url }}">About</a>
      <a href="{{ '/feed.xml' | relative_url }}" title="RSS Feed">RSS</a>
      {% if site.buttondown_username %}
      <a href="https://buttondown.com/{{ site.buttondown_username }}" title="Zero-noise newsletter">Newsletter</a>
      {% endif %}
    </nav>
  </div>
</header>
