{% if include.url %}
<div class="notebook-container">
  {% if include.description %}
  <p class="notebook-description">{{ include.description }}</p>
  {% endif %}

  <div class="notebook-buttons">
    <a href="{{ include.url }}" class="notebook-btn colab-btn" target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
        <path d="M4.54 9.46a5.02 5.02 0 0 1 7.07 0l.4.39.38-.39a5.02 5.02 0 0 1 7.07 0 4.93 4.93 0 0 1 0 7l-7.45 7.4-7.47-7.4a4.93 4.93 0 0 1 0-7z"/>
      </svg>
      Open in Colab
    </a>
    {% if include.github %}
    <a href="{{ include.github }}" class="notebook-btn github-btn" target="_blank" rel="noopener">
      View on GitHub
    </a>
    {% endif %}
  </div>

  {% if include.embed %}
  <div class="notebook-embed">
    <iframe src="{{ include.url }}" width="100%" height="600" frameborder="0" allowfullscreen></iframe>
  </div>
  {% endif %}
</div>
{% endif %}
