title: "cmenguy@terminal:~$"
description: "AI/ML Engineering Blog — LLMs, ML Systems, and Deep Learning. Code-first deep-dives into transformers, fine-tuning, inference, and production ML systems."
url: "https://ai-terminal.net"
baseurl: ""
lang: en

author:
  name: Charles Menguy
  twitter: aiterminalhq
  url: https://ai-terminal.net/about/

twitter:
  username: aiterminalhq
  card: summary

social:
  name: Charles Menguy
  links:
    - https://x.com/aiterminalhq
    - https://github.com/cmenguy
    - https://www.linkedin.com/in/charlesmenguy/

logo: /assets/images/favicon.svg

permalink: /:categories/:year/:month/:day/:title/

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  math_engine: null

highlighter: rouge
future: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "cmenguy"
  - scope:
      path: ""
    values:
      layout: "page"

buttondown_username: cmenguy

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - notebooks/
  - _medium/
